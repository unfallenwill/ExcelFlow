[project]
name = "excelflow"
version = "0.1.0"
description = "Excel-declared data extraction powered by Pandas"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "openpyxl>=3.1.5",
    "pandas>=3.0.3",
]

[project.scripts]
excelflow = "excelflow.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/excelflow"]
